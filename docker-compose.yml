version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: opspulse-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - opspulse-network

  redis:
    image: redis:7.0-alpine
    container_name: opspulse-redis
    ports:
      - "6379:6379"
    networks:
      - opspulse-network

  backend:
    build: ./backend
    container_name: opspulse-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongodb
      - redis
    networks:
      - opspulse-network

  frontend:
    build: ./frontend
    container_name: opspulse-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - opspulse-network

volumes:
  mongodb_data:

networks:
  opspulse-network:
    driver: bridge
